title: MTL Soccer
description: >-
  MTL Soccer is part of the Mountain Top League, an all-volunteer organization
  serving the children of West Orange, NJ since 1959.
url: "https://siliconsaga.github.io"
baseurl: "/mtl-site"

permalink: pretty
markdown: kramdown

sass:
  sass_dir: _sass
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - vendor

defaults:
  - scope:
      path: ""
    values:
      layout: page
